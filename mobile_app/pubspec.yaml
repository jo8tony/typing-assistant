name: typing_assistant
description: 跨设备打字助手 - 手机端

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # WebSocket 通信
  web_socket_channel: ^2.4.0
  
  # mDNS 局域网发现
  multicast_dns: ^0.3.2
  
  # OCR 文字识别 (Google ML Kit - 支持中文)
  google_mlkit_text_recognition: ^0.13.0
  
  # 图片选择
  image_picker: ^1.0.7
  
  # 权限管理
  permission_handler: ^11.2.0
  
  # 网络信息
  network_info_plus: ^4.1.0
  
  # 设备信息
  device_info_plus: ^9.1.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # UI 组件
  flutter_screenutil: ^5.9.0
  
  # 国际化
  intl: ^0.19.0
  
  # 二维码扫描
  mobile_scanner: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
