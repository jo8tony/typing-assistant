name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Create necessary Android files
      working-directory: ./mobile_app/android
      run: |
        # Create local.properties
        echo "flutter.sdk=${{ env.FLUTTER_ROOT }}" > local.properties
        echo "flutter.versionCode=1" >> local.properties
        echo "flutter.versionName=1.0.0" >> local.properties
        
        # Create gradle wrapper if not exists
        if [ ! -f gradlew ]; then
          flutter create --platforms android .
        fi
    
    - name: Install dependencies
      working-directory: ./mobile_app
      run: flutter pub get
    
    - name: Build APK
      working-directory: ./mobile_app
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: typing-assistant-apk
        path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
